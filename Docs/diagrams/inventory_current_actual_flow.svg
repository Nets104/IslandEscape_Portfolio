<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#111111"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#666666"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font-family: Arial, "Malgun Gothic", sans-serif; font-size: 44px; font-weight: 700; fill: #111111; }
      .subtitle { font-family: Arial, "Malgun Gothic", sans-serif; font-size: 22px; font-weight: 400; fill: #333333; }
      .lane { font-family: Arial, "Malgun Gothic", sans-serif; font-size: 16px; font-weight: 700; fill: #666666; letter-spacing: 2px; }
      .boxTitle { font-family: Arial, "Malgun Gothic", sans-serif; font-size: 23px; font-weight: 700; fill: #111111; }
      .boxText { font-family: Arial, "Malgun Gothic", sans-serif; font-size: 17px; font-weight: 400; fill: #333333; }
      .darkTitle { font-family: Arial, "Malgun Gothic", sans-serif; font-size: 23px; font-weight: 700; fill: #ffffff; }
      .darkText { font-family: Arial, "Malgun Gothic", sans-serif; font-size: 17px; font-weight: 400; fill: #e0e0e0; }
      .label { font-family: Arial, "Malgun Gothic", sans-serif; font-size: 15px; font-weight: 700; fill: #333333; }
      .muted { font-family: Arial, "Malgun Gothic", sans-serif; font-size: 15px; font-weight: 400; fill: #666666; }
      .small { font-family: Arial, "Malgun Gothic", sans-serif; font-size: 14px; font-weight: 400; fill: #444444; }
      .whiteBox { fill: #ffffff; stroke: #111111; stroke-width: 2.5; rx: 8; }
      .darkBox { fill: #1f1f1f; stroke: #111111; stroke-width: 2.5; rx: 8; }
      .softBox { fill: #fafafa; stroke: #dadada; stroke-width: 2; rx: 8; }
      .line { stroke: #111111; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .lineGray { stroke: #666666; stroke-width: 2.5; fill: none; marker-end: url(#arrowGray); }
      .dash { stroke: #888888; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrowGray); }
      .thin { stroke: #dadada; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1200"/>

  <text class="title" x="800" y="72" text-anchor="middle">현재 코드 흐름</text>
  <line x1="670" y1="98" x2="930" y2="98" stroke="#111111" stroke-width="3"/>
  <text class="subtitle" x="800" y="135" text-anchor="middle">Widget은 입력과 드랍 위치를 판단하고, 슬롯 변경은 Component 함수에서 처리됩니다.</text>

  <line class="thin" x1="70" y1="180" x2="1530" y2="180"/>
  <line class="thin" x1="70" y1="330" x2="1530" y2="330"/>
  <line class="thin" x1="70" y1="520" x2="1530" y2="520"/>
  <line class="thin" x1="70" y1="760" x2="1530" y2="760"/>
  <line class="thin" x1="70" y1="950" x2="1530" y2="950"/>

  <text class="lane" x="80" y="205">PLAYER INPUT</text>
  <text class="lane" x="80" y="355">WIDGET</text>
  <text class="lane" x="80" y="545">COMPONENT FUNCTION</text>
  <text class="lane" x="80" y="785">DATA OWNER</text>
  <text class="lane" x="80" y="975">UI UPDATE</text>

  <!-- Player action -->
  <rect class="whiteBox" x="520" y="210" width="560" height="86"/>
  <text class="boxTitle" x="800" y="244" text-anchor="middle">플레이어 동작</text>
  <text class="boxText" x="800" y="274" text-anchor="middle">드래그 / 드랍 / 우클릭 빠른 이동</text>

  <!-- Widgets -->
  <rect class="whiteBox" x="135" y="380" width="405" height="112"/>
  <text class="boxTitle" x="337" y="418" text-anchor="middle">ItemSlotWidget</text>
  <text class="boxText" x="337" y="448" text-anchor="middle">Inventory 슬롯 입력 처리</text>
  <text class="boxText" x="337" y="474" text-anchor="middle">NativeOnDrop / 우클릭 이동</text>

  <rect class="whiteBox" x="595" y="380" width="410" height="112"/>
  <text class="boxTitle" x="800" y="418" text-anchor="middle">InventoryDragDropOperation</text>
  <text class="boxText" x="800" y="448" text-anchor="middle">SourceType / SlotIndex / ItemID</text>
  <text class="boxText" x="800" y="474" text-anchor="middle">Quantity / Durability 전달</text>

  <rect class="whiteBox" x="1060" y="380" width="405" height="112"/>
  <text class="boxTitle" x="1262" y="418" text-anchor="middle">QuickSlotSlotWidget</text>
  <text class="boxText" x="1262" y="448" text-anchor="middle">QuickSlot 슬롯 입력 처리</text>
  <text class="boxText" x="1262" y="474" text-anchor="middle">NativeOnDrop</text>

  <path class="line" d="M800 296 L337 370"/>
  <path class="line" d="M800 296 L1262 370"/>
  <path class="lineGray" d="M540 436 L585 436"/>
  <path class="lineGray" d="M1015 436 L1050 436"/>

  <!-- Component functions -->
  <rect class="darkBox" x="105" y="575" width="370" height="134"/>
  <text class="darkTitle" x="290" y="613" text-anchor="middle">InventoryComponent</text>
  <text class="darkText" x="290" y="644" text-anchor="middle">인벤토리 내부 이동</text>
  <text class="darkText" x="290" y="670" text-anchor="middle">MoveItem / SwapSlots</text>
  <text class="darkText" x="290" y="696" text-anchor="middle">SetSlotData / ClearSlot</text>

  <rect class="darkBox" x="565" y="575" width="470" height="134"/>
  <text class="darkTitle" x="800" y="613" text-anchor="middle">QuickSlotComponent</text>
  <text class="darkText" x="800" y="644" text-anchor="middle">인벤토리 ↔ 퀵슬롯 이동 처리</text>
  <text class="darkText" x="800" y="670" text-anchor="middle">MoveInventoryToQuickSlot</text>
  <text class="darkText" x="800" y="696" text-anchor="middle">MoveQuickSlotToInventory / SwapSlots</text>

  <rect class="softBox" x="1105" y="575" width="390" height="134"/>
  <text class="boxTitle" x="1300" y="613" text-anchor="middle">Inventory 접근 경로</text>
  <text class="boxText" x="1300" y="644" text-anchor="middle">IInventoryInterface 경유</text>
  <text class="boxText" x="1300" y="670" text-anchor="middle">Execute_GetInventoryComponent()</text>
  <text class="boxText" x="1300" y="696" text-anchor="middle">필요 시 Inventory 슬롯 갱신 호출</text>

  <!-- Widget -> function arrows -->
  <path class="line" d="M305 492 L285 565"/>
  <text class="label" x="185" y="535" text-anchor="start">Inventory → Inventory</text>

  <path class="line" d="M382 492 L650 565"/>
  <text class="label" x="460" y="535" text-anchor="start">QuickSlot → Inventory</text>

  <path class="line" d="M1215 492 L905 565"/>
  <text class="label" x="1032" y="535" text-anchor="middle">Inventory → QuickSlot</text>

  <path class="line" d="M1300 492 L920 565"/>
  <text class="label" x="1262" y="535" text-anchor="middle">QuickSlot → QuickSlot</text>

  <path class="dash" d="M455 410 L596 405"/>
  <text class="muted" x="514" y="392" text-anchor="middle">DragOp 생성</text>

  <path class="dash" d="M1145 410 L1006 405"/>
  <text class="muted" x="1086" y="392" text-anchor="middle">DragOp 읽기</text>

  <!-- Function -> data owner -->
  <rect class="darkBox" x="175" y="810" width="370" height="104"/>
  <text class="darkTitle" x="360" y="850" text-anchor="middle">InventoryComponent</text>
  <text class="darkText" x="360" y="880" text-anchor="middle">Inventory 슬롯 데이터 소유</text>

  <rect class="darkBox" x="705" y="810" width="370" height="104"/>
  <text class="darkTitle" x="890" y="850" text-anchor="middle">QuickSlotComponent</text>
  <text class="darkText" x="890" y="880" text-anchor="middle">QuickSlot 슬롯 데이터 소유</text>

  <rect class="softBox" x="1150" y="810" width="335" height="104"/>
  <text class="boxTitle" x="1317" y="849" text-anchor="middle">남아 있는 한계</text>
  <text class="boxText" x="1317" y="879" text-anchor="middle">Widget의 Component 직접 탐색과</text>
  <text class="boxText" x="1317" y="903" text-anchor="middle">일부 판단 로직은 아직 남아 있음</text>

  <path class="line" d="M290 709 L355 800"/>
  <text class="label" x="235" y="758" text-anchor="start">Broadcast()</text>

  <path class="line" d="M760 709 L888 800"/>
  <text class="label" x="790" y="758" text-anchor="start">Slots 변경</text>

  <path class="line" d="M790 709 L505 800"/>
  <text class="label" x="535" y="758" text-anchor="start">SetSlotData / ClearSlot 호출</text>

  <path class="dash" d="M1035 642 L1095 642"/>
  <path class="dash" d="M1300 709 L560 810"/>
  <text class="muted" x="1295" y="758" text-anchor="middle">InventoryComponent 참조</text>

  <!-- UI update -->
  <rect class="whiteBox" x="150" y="1005" width="360" height="104"/>
  <text class="boxTitle" x="330" y="1045" text-anchor="middle">InventoryWidget</text>
  <text class="boxText" x="330" y="1075" text-anchor="middle">인벤토리 화면 갱신</text>

  <rect class="whiteBox" x="620" y="1005" width="360" height="104"/>
  <text class="boxTitle" x="800" y="1045" text-anchor="middle">InventoryWidget</text>
  <text class="boxText" x="800" y="1075" text-anchor="middle">퀵슬롯 표시도 갱신</text>

  <rect class="whiteBox" x="1090" y="1005" width="360" height="104"/>
  <text class="boxTitle" x="1270" y="1045" text-anchor="middle">QuickSlotWidget / HUD</text>
  <text class="boxText" x="1270" y="1075" text-anchor="middle">HUD 퀵슬롯 갱신</text>

  <path class="lineGray" d="M360 914 L330 995"/>
  <text class="labelGray" x="245" y="956" text-anchor="middle">OnInventoryUpdated</text>

  <path class="lineGray" d="M890 914 L800 995"/>
  <text class="labelGray" x="770" y="956" text-anchor="middle">OnQuickSlotUpdated</text>

  <path class="lineGray" d="M930 914 L1270 995"/>
  <text class="labelGray" x="1145" y="956" text-anchor="middle">OnQuickSlotUpdated</text>
</svg>
